name: Build Linux Packages

# Manual trigger — builds branded .deb + .rpm packages for testers.
# The backend is installed from the PUBLIC pre-built wheel (Positronic-AI/
# lit-releases) — this repo needs NO access to lit-lib source and NO token.
on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand to build"
        type: choice
        options: [jovai, litai]
        default: litai
      lib_version:
        description: "positronic-lit wheel version (blank/latest -> newest published)"
        default: "latest"
      version:
        description: "Version override (blank -> auto 2.0.<run number>)"
        default: ""

jobs:
  build-linux:
    runs-on: ubuntu-latest # x86_64-unknown-linux-gnu
    permissions:
      contents: write
    env:
      LIT_BUILD_VERSION: ${{ inputs.version || format('2.0.{0}', github.run_number) }}
    steps:
      - name: Checkout lit-desktop
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf rpm

      - name: Checkout lit-bridge-rs (native bridge, public)
        uses: actions/checkout@v4
        with:
          repository: Positronic-AI/lit-bridge-rs
          ref: main
          path: lit-bridge-rs-src

      - name: Build the native bridge
        run: |
          cargo build --release --manifest-path "$GITHUB_WORKSPACE/lit-bridge-rs-src/Cargo.toml"
          echo "LIT_BRIDGE_RS_BUNDLE=$GITHUB_WORKSPACE/lit-bridge-rs-src/target/release/lit-bridge-rs" >> "$GITHUB_ENV"

      - name: Freeze the backend (PyInstaller, from public wheel)
        working-directory: backend
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pip install --upgrade pip pyinstaller
          curl -fsSL -o install.py https://github.com/Positronic-AI/lit-releases/releases/latest/download/install.py
          VER="${{ inputs.lib_version }}"
          if [ -n "$VER" ] && [ "$VER" != "latest" ]; then
            python install.py --version "$VER"
          else
            python install.py
          fi
          pyinstaller --noconfirm lit-server.spec

      - name: Stage the frozen backend as the Tauri sidecar
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          echo "host triple: $TRIPLE"
          mkdir -p src-tauri/binaries
          cp "backend/dist/lit-server" "src-tauri/binaries/lit-server-${TRIPLE}"
          chmod +x "src-tauri/binaries/lit-server-${TRIPLE}"

      - name: Build the branded packages
        run: |
          npm install
          ./scripts/build-brand.sh "${{ inputs.brand }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.brand }}-linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      # Public downloads go to the dedicated releases repo (litai only) under a
      # rolling "latest" release with STABLE, version-less asset names, so the
      # install page can link to permanent /releases/latest/download/<name> URLs.
      # jovai (white-label) tester builds stay in this repo, per-version.
      - name: Publish
        env:
          GH_TOKEN: ${{ inputs.brand == 'litai' && secrets.RELEASES_TOKEN || github.token }}
        run: |
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          RPM=$(find src-tauri/target/release/bundle/rpm -name "*.rpm" | head -1)
          if [ "${{ inputs.brand }}" = "litai" ]; then
            cp "$DEB" "LIT-Desktop-Linux-x64.deb"
            cp "$RPM" "LIT-Desktop-Linux-x64.rpm"
            REPO="Positronic-AI/lit-desktop-releases"
            gh release view latest --repo "$REPO" >/dev/null 2>&1 || \
              gh release create latest --repo "$REPO" --title "LIT Desktop (latest)" \
                --notes "Latest LIT Desktop installers for macOS, Windows, and Linux. Unsigned early-access builds." --latest
            gh release upload latest "LIT-Desktop-Linux-x64.deb" "LIT-Desktop-Linux-x64.rpm" --repo "$REPO" --clobber
            echo "published Linux ${LIT_BUILD_VERSION} to $REPO/releases/latest"
          else
            TAG="${{ inputs.brand }}-linux-v${LIT_BUILD_VERSION}"
            gh release create "$TAG" "$DEB" "$RPM" \
              --repo "${{ github.repository }}" \
              --title "${{ inputs.brand }} Desktop ${LIT_BUILD_VERSION} (Linux)" \
              --notes "Unsigned tester build (Linux x86_64). Install the .deb or .rpm."
          fi
