name: Build macOS DMG

# Manual trigger — builds a branded, unsigned .dmg for testers.
# The backend is installed from the PUBLIC pre-built wheel (Positronic-AI/
# lit-releases) — this repo needs NO access to lit-lib source and NO token.
on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand to build"
        type: choice
        options: [jovai, litai]
        default: jovai
      lib_version:
        description: "positronic-lit wheel version (blank/latest -> newest published)"
        default: "latest"
      version:
        description: "Version override (blank -> auto 2.0.<run number>)"
        default: ""

jobs:
  build-dmg:
    runs-on: macos-latest # Apple Silicon -> aarch64-apple-darwin
    permissions:
      contents: write # to publish the release
    env:
      # Auto-incrementing build version: each run bumps the patch. Override via input.
      LIT_BUILD_VERSION: ${{ inputs.version || format('2.0.{0}', github.run_number) }}
    steps:
      - name: Checkout lit-desktop
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout lit-bridge-rs (native bridge, public)
        uses: actions/checkout@v4
        with:
          repository: Positronic-AI/lit-bridge-rs
          ref: main
          path: lit-bridge-rs-src

      - name: Build + ad-hoc sign the native bridge
        run: |
          cargo build --release --manifest-path "$GITHUB_WORKSPACE/lit-bridge-rs-src/Cargo.toml"
          BIN="$GITHUB_WORKSPACE/lit-bridge-rs-src/target/release/lit-bridge-rs"
          # Ad-hoc sign so Apple Silicon will exec it as a subprocess. Standalone
          # binary (no dylib loading from us), so plain ad-hoc is sufficient.
          codesign --force --sign - --timestamp=none "$BIN"
          # The PyInstaller spec bundles this verbatim (datas) so the signature
          # survives; the entry point resolves it and sets LIT_BRIDGE_RS_BIN.
          echo "LIT_BRIDGE_RS_BUNDLE=$BIN" >> "$GITHUB_ENV"
          echo "native bridge built + signed: $BIN"

      - name: Freeze the backend (PyInstaller, from public wheel)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip pyinstaller
          # Install the compiled backend from the PUBLIC releases (no lit-lib source).
          curl -fsSL -o install.py https://github.com/Positronic-AI/lit-releases/releases/latest/download/install.py
          VER="${{ inputs.lib_version }}"
          if [ -n "$VER" ] && [ "$VER" != "latest" ]; then
            python install.py --version "$VER"
          else
            python install.py
          fi
          pyinstaller --noconfirm lit-server.spec

      - name: Stage the frozen backend as the Tauri sidecar
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          echo "host triple: $TRIPLE"
          mkdir -p src-tauri/binaries
          cp "backend/dist/lit-server" "src-tauri/binaries/lit-server-${TRIPLE}"
          chmod +x "src-tauri/binaries/lit-server-${TRIPLE}"

      - name: Build the branded .dmg
        run: |
          npm install
          ./scripts/build-brand.sh "${{ inputs.brand }}"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.brand }}-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          TAG="${{ inputs.brand }}-v${LIT_BUILD_VERSION}"
          echo "publishing $TAG with $DMG"
          gh release create "$TAG" "$DMG" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.brand }} Desktop ${LIT_BUILD_VERSION} (macOS - Apple Silicon)" \
            --notes "Unsigned tester build (Apple Silicon). Install: open the .dmg, drag the app to Applications, then run 'xattr -cr /Applications/<App>.app' once and open it. Full Developer-ID signing/notarization is coming; until then the xattr step clears the download quarantine." \
            --latest
