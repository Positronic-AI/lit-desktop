name: Build Windows Installer

# Manual trigger — builds a branded, unsigned Windows installer (.msi + NSIS .exe)
# for testers. Mirrors the macOS workflow.
# The backend is installed from the PUBLIC pre-built wheel (Positronic-AI/
# lit-releases) — this repo needs NO access to lit-lib source and NO token.
on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand to build"
        type: choice
        options: [jovai, litai]
        default: litai
      lib_version:
        description: "positronic-lit wheel version (blank/latest -> newest published)"
        default: "latest"
      version:
        description: "Version override (blank -> auto 2.0.<run number>)"
        default: ""

jobs:
  build-windows:
    runs-on: windows-latest # x86_64-pc-windows-msvc
    permissions:
      contents: write # to publish the release
    defaults:
      run:
        shell: bash # bash for parity with build-brand.sh; Git Bash ships on the runner
    env:
      # Auto-incrementing build version: each run bumps the patch. Override via input.
      LIT_BUILD_VERSION: ${{ inputs.version || format('2.0.{0}', github.run_number) }}
    steps:
      - name: Checkout lit-desktop
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout lit-bridge-rs (native bridge, public)
        uses: actions/checkout@v4
        with:
          repository: Positronic-AI/lit-bridge-rs
          ref: main
          path: lit-bridge-rs-src

      - name: Build the native bridge
        run: |
          cd lit-bridge-rs-src
          cargo build --release
          # pwd -W yields a Windows-style path (D:/a/...) that Python's
          # os.path.exists in the spec can read; the MSYS /d/... form can't.
          echo "LIT_BRIDGE_RS_BUNDLE=$(pwd -W)/target/release/lit-bridge-rs.exe" >> "$GITHUB_ENV"
          echo "native bridge built: $(pwd -W)/target/release/lit-bridge-rs.exe"

      - name: Freeze the backend (PyInstaller, from public wheel)
        working-directory: backend
        env:
          # install.py prints a box-drawing banner; force UTF-8 so its stdout
          # doesn't crash under the Windows runner's default cp1252 codec.
          PYTHONUTF8: "1"
        run: |
          python -m pip install --upgrade pip pyinstaller
          # Install the compiled backend from the PUBLIC releases (no lit-lib source).
          curl -fsSL -o install.py https://github.com/Positronic-AI/lit-releases/releases/latest/download/install.py
          VER="${{ inputs.lib_version }}"
          if [ -n "$VER" ] && [ "$VER" != "latest" ]; then
            python install.py --version "$VER"
          else
            python install.py
          fi
          pyinstaller --noconfirm lit-server.spec

      - name: Stage the frozen backend as the Tauri sidecar
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          echo "host triple: $TRIPLE"
          mkdir -p src-tauri/binaries
          cp "backend/dist/lit-server.exe" "src-tauri/binaries/lit-server-${TRIPLE}.exe"

      - name: Build the branded installer
        run: |
          npm install
          ./scripts/build-brand.sh "${{ inputs.brand }}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.brand }}-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      # Both brands publish to lit-desktop-releases under a rolling per-brand tag
      # (litai -> "latest", jovai -> "jovai") with stable, brand-prefixed names.
      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          REPO="Positronic-AI/lit-desktop-releases"
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          NSIS=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          if [ "${{ inputs.brand }}" = "litai" ]; then TAG="latest"; PREFIX="LIT-Desktop"; TITLE="LIT Desktop (latest)"; LATEST="--latest"; else TAG="jovai"; PREFIX="JovAI"; TITLE="JovAI Desktop (latest)"; LATEST=""; fi
          cp "$MSI" "${PREFIX}-Windows-x64.msi"
          cp "$NSIS" "${PREFIX}-Windows-x64-setup.exe"
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" \
              --notes "Latest ${PREFIX} installers (macOS, Windows, Linux). Unsigned early-access builds." $LATEST
          gh release upload "$TAG" "${PREFIX}-Windows-x64.msi" "${PREFIX}-Windows-x64-setup.exe" --repo "$REPO" --clobber
          echo "published Windows ${LIT_BUILD_VERSION} to $REPO/releases/$TAG"
