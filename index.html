<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIT</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <!-- App-level toolbar. Favorites rail + global controls. Right-click to reposition. -->
      <div id="app-toolbar" title="Right-click to reposition">
        <button id="toolbar-add" class="icon-btn header-btn" title="Add a shortcut">+</button>
        <div id="toolbar-favorites"></div>
        <button id="settings-btn-global" class="icon-btn header-btn" title="Settings">&#9881;</button>
        <button id="theme-toggle" class="icon-btn header-btn" title="Toggle theme">&#9790;</button>
      </div>
      <main id="content">
        <div id="dockview-container"></div>
        <!-- Live terminal — a full-area overlay over the dock for now; becomes a
             dockable panel in a later step. -->
        <div id="terminal-panel" style="display:none">
          <div id="terminal-panel-header">
            <span id="terminal-panel-title">Live terminal</span>
            <span id="terminal-panel-hint">— you're driving the real session; type to steer it</span>
            <button id="terminal-drawer-close" title="Close terminal">&times;</button>
          </div>
          <div id="terminal-host"></div>
        </div>
        <!-- Chat panel content. ChatPanel.mount() clones this template into its
             dockview panel host; all lookups inside are per-instance (classes,
             not ids), so a future multi-instance UI can clone it repeatedly. -->
        <template id="chat-panel-template">
          <div class="chat-panel-root">
            <nav class="sidebar">
              <div class="channel-list">
                <div class="section-label">Channels</div>
              </div>
            </nav>
            <div class="sidebar-resize-handle"></div>
            <div class="chat-main">
              <header class="content-header">
                <button class="icon-btn header-btn sidebar-expand-btn" title="Show sidebar" style="display:none">&#9654;</button>
                <h2 class="channel-title">Welcome</h2>
                <div class="channel-actions"></div>
                <button class="icon-btn header-btn search-toggle-btn" title="Search this channel (Ctrl+F)">&#128269;</button>
                <button class="icon-btn header-btn terminal-toggle-btn" title="Toggle live terminal">&gt;_</button>
              </header>
              <div class="messages-wrapper">
              <div class="messages">
                <div class="message system">
                  <div class="message-content">
                    <p><strong>LIT Desktop v2.0</strong></p>
                    <p>Connect to a LIT server to get started.</p>
                    <p class="hint">Use <kbd>Ctrl+K</kbd> to open the command palette.</p>
                  </div>
                </div>
              </div>
              <button class="scroll-to-bottom" title="Scroll to bottom">
                <span class="scroll-arrow">&#8595;</span>
              </button>
            </div>
            <div class="input-resize-handle"></div>
            <div class="input-area">
              <div class="agent-tabs"></div>
              <div class="agent-info"></div>
              <div class="input-row">
                <textarea class="message-input" placeholder="Type a message..." rows="1"></textarea>
                <button class="cancel-stream-btn" title="Stop generating" style="display:none">&#9632;</button>
                <button class="send-btn" title="Send (Enter)">&#8593;</button>
              </div>
            </div>
            </div>
          </div>
        </template>
      </main>
    </div>
    <div id="image-lightbox">
      <span id="lightbox-close">&times;</span>
      <img id="lightbox-img" src="" alt="Enlarged image" />
    </div>
    <div id="command-palette-overlay">
      <div id="command-palette">
        <input type="text" id="command-input" placeholder="Type a command..." autocomplete="off" />
        <div class="command-list" id="command-list"></div>
      </div>
    </div>
  </body>
</html>
